<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #1877f2; }
        textarea { width: 100%; height: 100px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; }
        button { background: #1877f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>জিন্নাহ নোট বুক</h1>
        <p>আপনার জরুরি কাজগুলো এখানে লিখে রাখুন।</p>
        <textarea id="noteInput" placeholder="কিছু লিখুন..."></textarea>
        <button onclick="saveNote()">সেভ করুন</button>
        <div id="display"></div>
    </div>

    <script>
        function saveNote() {
            const note = document.getElementById('noteInput').value;
            document.getElementById('display').innerHTML = "<b>সর্বশেষ নোট:</b> " + note;
            alert("সফলভাবে সেভ হয়েছে!");
        }
    </script>
</body>
</html>
